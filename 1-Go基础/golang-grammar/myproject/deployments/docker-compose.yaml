version: "3.8"

services:
  server:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=compose-secret
      - LOG_LEVEL=info
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.worker
    environment:
      - LOG_LEVEL=info
    depends_on:
      - server

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myproject
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data: