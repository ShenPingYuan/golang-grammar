openapi: "3.0.3"
info:
  title: MyProject API
  version: "1.0.0"
  description: 用户与订单管理 API

servers:
  - url: http://localhost:8080
    description: 本地开发

paths:
  /healthz:
    get:
      summary: 健康检查
      responses:
        "200":
          description: OK

  /api/v1/register:
    post:
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string }
                email:    { type: string, format: email }
                password: { type: string, minLength: 6 }
      responses:
        "201":
          description: 注册成功

  /api/v1/login:
    post:
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string }
                password: { type: string }
      responses:
        "200":
          description: 登录成功，返回 JWT token

  /api/v1/users:
    get:
      summary: 用户列表
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK

  /api/v1/orders:
    post:
      summary: 创建订单
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product: { type: string }
                amount:  { type: number }
      responses:
        "201":
          description: 创建成功

  /api/v1/orders/{id}/pay:
    post:
      summary: 支付订单
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 支付成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT